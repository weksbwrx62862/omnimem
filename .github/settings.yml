repository:
  name: omnimem
  description: "OmniMem — 五层混合记忆系统：感知→工作→结构化→深层→内化，含治理引擎(冲突/衰减/遗忘/隐私/溯源)"
  topics:
    - memory-system
    - ai-agent
    - rag
    - vector-database
    - knowledge-graph
    - chromadb
    - python
    - memory-provider
    - hermes-plugin
    - consolidation
    - forgetting-curve
    - privacy-protection
    - provenance-tracking
  has_issues: true
  has_projects: true
  has_wiki: false
  has_discussions: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true
  allow_forking: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# 分支保护规则 - 由 Probot Settings 应用管理
# 修改此文件后推送到 main 分支即可自动同步到 GitHub
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - "Lint & Format Check"
          - "Test Python 3.10"
          - "Test Python 3.11"
          - "Test Python 3.12"
      enforce_admins: false
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true

# 议题模板配置
issues:
  enabled: true
  blank_issues_enabled: true
